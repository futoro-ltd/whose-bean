services:
  app:
    container_name: whose-bean
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - JWT_SECRET=${JWT_SECRET}
        - DATABASE_URL=file:/app/data/dev.db
    ports:
      - '9500:9500'
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL:-http://localhost:9500}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - SMTP_FRNEXT_SERVER_ACTIONS_ENCRYPTION_KEYOM=${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY}
    volumes:
      - whose-bean-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9500/api/analytics']
      interval: 30s
      timeout: 10s
      retries: 3

  # Uncomment to use PostgreSQL instead of SQLite:
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     - POSTGRES_USER=analytics
  #     - POSTGRES_PASSWORD=analytics_password
  #     - POSTGRES_DB=analytics
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #
  # Then set DATABASE_URL in .env:
  # DATABASE_URL="postgresql://analytics:analytics_password@postgres:5432/analytics"

# volumes:
#   postgres_data:

volumes:
  whose-bean-data:
